<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <meta http-equiv="X-UA-Compatible" content="IE=edge" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>Wordle</title>
        <link
            href="https://cdnjs.cloudflare.com/ajax/libs/toastr.js/latest/toastr.min.css"
            rel="stylesheet"
        />
        <link
            rel="stylesheet"
            href="https://cdnjs.cloudflare.com/ajax/libs/animate.css/4.1.1/animate.min.css"
        />
        <link
            href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
            rel="stylesheet"
            integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH"
            crossorigin="anonymous"
        />
        <link rel="stylesheet" href="style.css" />
        <link rel="icon" href="./favicon.ico" type="image/x-icon" />
    </head>
    <body>
        <h1>Wordle</h1>

        <div id="board"></div>
        <div id="keyboard-cont">
            <div class="first-row">
                <button class="keyboard-button alphabets">q</button>
                <button class="keyboard-button alphabets">w</button>
                <button class="keyboard-button alphabets">e</button>
                <button class="keyboard-button alphabets">r</button>
                <button class="keyboard-button alphabets">t</button>
                <button class="keyboard-button alphabets">y</button>
                <button class="keyboard-button alphabets">u</button>
                <button class="keyboard-button alphabets">i</button>
                <button class="keyboard-button alphabets">o</button>
                <button class="keyboard-button alphabets">p</button>
            </div>
            <div class="second-row">
                <button class="keyboard-button alphabets">a</button>
                <button class="keyboard-button alphabets">s</button>
                <button class="keyboard-button alphabets">d</button>
                <button class="keyboard-button alphabets">f</button>
                <button class="keyboard-button alphabets">g</button>
                <button class="keyboard-button alphabets">h</button>
                <button class="keyboard-button alphabets">j</button>
                <button class="keyboard-button alphabets">k</button>
                <button class="keyboard-button alphabets">l</button>
            </div>
            <div class="third-row">
                <button class="keyboard-button">Del</button>
                <button class="keyboard-button alphabets">z</button>
                <button class="keyboard-button alphabets">x</button>
                <button class="keyboard-button alphabets">c</button>
                <button class="keyboard-button alphabets">v</button>
                <button class="keyboard-button alphabets">b</button>
                <button class="keyboard-button alphabets">n</button>
                <button class="keyboard-button alphabets">m</button>
                <button class="keyboard-button">Enter</button>
            </div>
        </div>

        <button id="settings-btn">Settings</button>

        <div id="settings-modal" class="modal">
            <div class="modal-content">
                <h2>Settings</h2>
                <form id="settings-form">
                    <label for="wordSize">Word Length: </label>
                    <select id="wordSize">
                        <option value="5" selected>5 (Default)</option>
                        <option value="6">6</option>
                        <option value="7">7</option>
                        <option value="8">8</option>
                        <option value="9">9</option>
                    </select>
                    <br />

                    <label for="guessCount">Number of Guesses: </label>
                    <select id="guessCount">
                        <option value="4">4</option>
                        <option value="5">5</option>
                        <option value="6" selected>6 (Default)</option>
                        <option value="7">7</option>
                        <option value="8">8</option>
                    </select>
                    <br />

                    <label for="level">Difficulty Level: </label>
                    <select id="level">
                        <option value="1" selected>1 (Default)</option>
                        <option value="2">2</option>
                        <option value="3">3</option>
                        <option value="4">4</option>
                        <option value="5">5</option>
                        <option value="6">6</option>
                        <option value="7">7</option>
                        <option value="8">8</option>
                        <option value="9">9</option>
                        <option value="10">10</option>
                    </select>
                    <br />

                    <button type="button" id="apply-btn">Apply</button>
                    <button type="button" id="reset-btn">Reset</button>
                </form>
            </div>
        </div>

        <script
            src="https://code.jquery.com/jquery-3.6.0.min.js"
            integrity="sha256-/xUj+3OJU5yExlq6GSYGSHk7tPXikynS7ogEvDej/m4="
            crossorigin="anonymous"
        ></script>
        <script src="https://cdnjs.cloudflare.com/ajax/libs/toastr.js/latest/toastr.min.js"></script>
        <script
            src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"
            integrity="sha384-YvpcrYf0tY3lHB60NNkmXc5s9fDVZLESaAA55NDzOxhy9GkcIdslK1eN7N6jIeHz"
            crossorigin="anonymous"
        ></script>
        <script src="./script.js" type="module"></script>
    </body>
</html>
